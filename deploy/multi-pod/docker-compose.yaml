# 双 Pod 共享 MySQL + MinIO 冒烟测试，用于无状态网关架构。
# 这是验证会话/记忆/身份/工作区确实在 Pod 之间共享
# 并能承受 Pod 重启的参考环境。
#
# 运行：
#   docker compose -f deploy/multi-pod/docker-compose.yaml up --build
#
# 约 10 秒后：
#   Pod A           http://localhost:18953  （管理员令牌：dev-admin-token）
#   Pod B           http://localhost:18954  （相同状态，不同 Pod）
#   MinIO 控制台    http://localhost:9001   （用户：minioadmin / 密码：minioadmin）
#   MySQL           bkclaw:bkclaw@tcp(localhost:3306)/bkclaw
#
# 冒烟测试清单（curl 示例使用 Pod A，然后从 Pod B 读取）：
#   1. 通过 A 执行 curl POST /api/agents          — 在共享数据库中创建 agent
#   2. 通过 B 执行 curl GET /api/agents           — B 无需重启即可看到
#   3. 通过 A 写入 SOUL.md，通过 B 读取            — 身份文件跨 Pod 访问
#   4. 通过 A 与 agent 聊天（无执行）               — 不创建沙箱
#   5. 通过 A 带执行聊天                           — 沙箱延迟创建
#   6. 等待 10+ 分钟或编辑 IdleTTLSec             — 沙箱被驱逐，数据库完好
#   7. 杀死 Pod A                                — B 继续服务所有状态

version: "3.8"

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: bkclaw
      MYSQL_USER: bkclaw
      MYSQL_PASSWORD: bkclaw
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u bkclaw -pbkclaw --silent"]
      interval: 2s
      timeout: 1s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 20

  # 在 MinIO 中初始化存储桶，以便网关在首次使用时不会崩溃。
  # 运行一次后退出 — compose 等待的是 "healthy" 而非 "exited"，
  # 因此两个网关 Pod 在此完成后通过 depends_on 启动。
  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/bkclaw;
        echo 'bucket ready';
      "

  pod-a:
    image: bkclaw:local
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      # 两个 Pod 使用相同配置 — 这就是"无状态"的全部意义。
      # 包含 TZ 以便跨 Pod 运行以与单 Pod 部署相同的方式
      # 测试服务器默认时区回退。
      TZ: Asia/Shanghai
      BKCLAW_STORAGE_TYPE: mysql
      BKCLAW_STORAGE_DSN: "bkclaw:bkclaw@tcp(db:3306)/bkclaw?parseTime=true&loc=UTC&charset=utf8mb4"
      BKCLAW_MODE: cloud
      BKCLAW_AUTH_TOKEN: dev-admin-token
      BKCLAW_REDIS_ADDR: redis:6379
      BKCLAW_REDIS_KEY_PREFIX: bkclaw-dev
      BKCLAW_TURN_LEASE_TTL_SECONDS: "7200"
      BKCLAW_STEER_STREAM_TTL_SECONDS: "86400"
      # 对象存储 → MinIO。这些键镜像了 config.ObjectStoreCfg。
      BKCLAW_OBJECT_STORE_TYPE: minio
      BKCLAW_OBJECT_STORE_ENDPOINT: minio:9000
      BKCLAW_OBJECT_STORE_BUCKET: bkclaw
      BKCLAW_OBJECT_STORE_ACCESSKEY: minioadmin
      BKCLAW_OBJECT_STORE_SECRETKEY: minioadmin
      BKCLAW_OBJECT_STORE_USESSL: "false"
    depends_on:
      db:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "18953:18953"

  pod-b:
    image: bkclaw:local
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Shanghai
      BKCLAW_STORAGE_TYPE: mysql
      BKCLAW_STORAGE_DSN: "bkclaw:bkclaw@tcp(db:3306)/bkclaw?parseTime=true&loc=UTC&charset=utf8mb4"
      BKCLAW_MODE: cloud
      BKCLAW_AUTH_TOKEN: dev-admin-token
      BKCLAW_REDIS_ADDR: redis:6379
      BKCLAW_REDIS_KEY_PREFIX: bkclaw-dev
      BKCLAW_TURN_LEASE_TTL_SECONDS: "7200"
      BKCLAW_STEER_STREAM_TTL_SECONDS: "86400"
      BKCLAW_OBJECT_STORE_TYPE: minio
      BKCLAW_OBJECT_STORE_ENDPOINT: minio:9000
      BKCLAW_OBJECT_STORE_BUCKET: bkclaw
      BKCLAW_OBJECT_STORE_ACCESSKEY: minioadmin
      BKCLAW_OBJECT_STORE_SECRETKEY: minioadmin
      BKCLAW_OBJECT_STORE_USESSL: "false"
    depends_on:
      db:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "18954:18953"

volumes:
  mysqldata:
  miniodata:
