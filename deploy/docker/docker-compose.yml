name: bkcrab

services:
  bkcrab:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: bkcrab/bkcrab:local
    restart: unless-stopped
    # Forward DNS to public resolvers instead of Docker Desktop's embedded
    # resolver, which intermittently returns "server misbehaving" (SERVFAIL)
    # under bursty lookups and breaks LLM/provider and web_fetch requests.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${BKCRAB_PORT:-18953}:18953"
    volumes:
      - bkcrab-data:/data/.bkcrab
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      BKCRAB_HOME: /data/.bkcrab
      BKCRAB_BIND: all
      BKCRAB_PORT: "18953"
      BKCRAB_STORAGE_TYPE: mysql
      BKCRAB_STORAGE_DSN: "bkcrab:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in deploy/docker/.env}@tcp(mysql:3306)/bkcrab?parseTime=true&loc=UTC&charset=utf8mb4"
      BKCRAB_STORAGE_AUTO_MIGRATE: "true"
      BKCRAB_OBJECT_STORE_TYPE: minio
      BKCRAB_OBJECT_STORE_ENDPOINT: minio:9000
      BKCRAB_OBJECT_STORE_BUCKET: "${MINIO_BUCKET:-bkcrab}"
      BKCRAB_OBJECT_STORE_PREFIX: "${MINIO_PREFIX:-}"
      BKCRAB_OBJECT_STORE_ACCESSKEY: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in deploy/docker/.env}"
      BKCRAB_OBJECT_STORE_SECRETKEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/docker/.env}"
      BKCRAB_OBJECT_STORE_USESSL: "false"
      DOCKER_HOST: tcp://sandbox-docker:2375
    depends_on:
      mysql:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      sandbox-docker:
        condition: service_healthy
      sandbox-image-init:
        condition: service_completed_successfully
    command: ["gateway"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18953/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: bkcrab
      MYSQL_USER: bkcrab
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD in deploy/docker/.env}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in deploy/docker/.env}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u bkcrab -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in deploy/docker/.env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/docker/.env}"
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-bootstrap:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in deploy/docker/.env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/docker/.env}"
      MINIO_BUCKET: "${MINIO_BUCKET:-bkcrab}"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"

  sandbox-docker:
    image: docker:28-dind
    privileged: true
    restart: unless-stopped
    # The inner Docker daemon is the runtime for agent sandbox containers.
    # Use stable upstream DNS instead of inheriting Docker Desktop's
    # intermittently flaky embedded resolver.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DOCKER_TLS_CERTDIR: ""
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,sandbox-docker}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,sandbox-docker}"
    command:
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
      - --tls=false
    volumes:
      - bkcrab-data:/data/.bkcrab
      - sandbox-docker-data:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 30

  sandbox-image-init:
    image: docker:28-dind
    restart: "no"
    depends_on:
      sandbox-docker:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://sandbox-docker:2375
      SANDBOX_IMAGE: "${BKCRAB_SANDBOX_IMAGE:-thinkany/bkcrab-sandbox:latest}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,sandbox-docker}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,sandbox-docker}"
    volumes:
      - ./sandbox:/sandbox:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        host_docker="docker --host unix:///var/run/docker.sock"
        dind_docker="docker --host tcp://sandbox-docker:2375"

        if $${dind_docker} image inspect "$${SANDBOX_IMAGE}" >/dev/null 2>&1; then
          echo "==> sandbox image already present in DinD: $${SANDBOX_IMAGE}"
        else
          if ! $${host_docker} image inspect "$${SANDBOX_IMAGE}" >/dev/null 2>&1; then
            if [ ! -f /sandbox/Dockerfile ]; then
              echo "sandbox image missing on host Docker and /sandbox/Dockerfile was not mounted"
              echo "prepare $${SANDBOX_IMAGE} on the host Docker daemon, or restore deploy/docker/sandbox/Dockerfile"
              exit 1
            fi

            echo "==> sandbox image missing on host Docker; building on host: $${SANDBOX_IMAGE}"
            $${host_docker} build \
              --build-arg HTTP_PROXY="$${HTTP_PROXY:-}" \
              --build-arg HTTPS_PROXY="$${HTTPS_PROXY:-}" \
              --build-arg NO_PROXY="$${NO_PROXY:-}" \
              --build-arg http_proxy="$${http_proxy:-}" \
              --build-arg https_proxy="$${https_proxy:-}" \
              --build-arg no_proxy="$${no_proxy:-}" \
              -t "$${SANDBOX_IMAGE}" \
              /sandbox
          fi

          echo "==> loading sandbox image into DinD: $${SANDBOX_IMAGE}"
          $${host_docker} save "$${SANDBOX_IMAGE}" | $${dind_docker} load
        fi

        echo "==> verifying sandbox image has Python"
        $${dind_docker} run --rm "$${SANDBOX_IMAGE}" python --version

  migrate-storage:
    profiles: ["migration"]
    image: bkcrab/bkcrab:local
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./.state:/migration:ro
    entrypoint: ["bkcrab-migrate-storage"]
    command:
      - --sqlite
      - /migration/bkcrab.db
      - --mysql
      - "bkcrab:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in deploy/docker/.env}@tcp(mysql:3306)/bkcrab?parseTime=true&loc=UTC&charset=utf8mb4"
      - --replace

volumes:
  bkcrab-data:
  mysql-data:
  minio-data:
  sandbox-docker-data:
