# Optional RAG services for deploy/docker/docker-compose.yml.
# Start with both files; this overlay intentionally reuses the base MinIO.
services:
  bkcrab:
    networks:
      - default
      - rag-parser-internal
    environment:
      BKCRAB_RAG_MILVUS_ADDRESS: milvus-standalone:19530
      BKCRAB_RAG_MILVUS_USERNAME: "${MILVUS_USERNAME:-}"
      BKCRAB_RAG_MILVUS_PASSWORD: "${MILVUS_PASSWORD:-}"
      BKCRAB_RAG_EMBEDDING_ENDPOINT: "${RAG_EMBEDDING_ENDPOINT:?set RAG_EMBEDDING_ENDPOINT in deploy/docker/.env}"
      BKCRAB_RAG_EMBEDDING_API_KEY: "${RAG_EMBEDDING_API_KEY:-}"
      BKCRAB_RAG_EMBEDDING_MODEL: "${RAG_EMBEDDING_MODEL:?set RAG_EMBEDDING_MODEL in deploy/docker/.env}"
      BKCRAB_RAG_EMBEDDING_DIMS: "${RAG_EMBEDDING_DIMS:?set RAG_EMBEDDING_DIMS in deploy/docker/.env}"
      BKCRAB_RAG_RERANKER_ENABLED: "${RAG_RERANKER_ENABLED:-false}"
      BKCRAB_RAG_RERANKER_ENDPOINT: "${RAG_RERANKER_ENDPOINT:-}"
      BKCRAB_RAG_RERANKER_API_KEY: "${RAG_RERANKER_API_KEY:-}"
      BKCRAB_RAG_RERANKER_MODEL: "${RAG_RERANKER_MODEL:-}"
      BKCRAB_RAG_RERANKER_TIMEOUT_MS: "${RAG_RERANKER_TIMEOUT_MS:-5000}"
      BKCRAB_RAG_RERANKER_CANDIDATE_TOP_K: "${RAG_RERANKER_CANDIDATE_TOP_K:-20}"
      BKCRAB_RAG_RERANKER_MIN_SCORE: "${RAG_RERANKER_MIN_SCORE:-0.5}"
      BKCRAB_RAG_ADVANCED_ENABLED: "${RAG_ADVANCED_ENABLED:-false}"
      BKCRAB_RAG_OFFICE_ENABLED: "${RAG_OFFICE_ENABLED:-false}"
      BKCRAB_RAG_ENRICHMENT_ENABLED: "${RAG_ENRICHMENT_ENABLED:-false}"
      BKCRAB_RAG_PARSER_ENDPOINT: http://rag-parser:8080
      BKCRAB_RAG_PARSER_TIMEOUT_MS: "${RAG_PARSE_TIMEOUT_MS:-600000}"
      BKCRAB_RAG_DOCUMENT_AI_API_TYPE: "${RAG_DOCUMENT_AI_API_TYPE:-openai-compatible}"
      BKCRAB_RAG_DOCUMENT_AI_ENDPOINT: "${RAG_DOCUMENT_AI_ENDPOINT:-}"
      BKCRAB_RAG_DOCUMENT_AI_API_KEY: "${RAG_DOCUMENT_AI_API_KEY:-}"
      BKCRAB_RAG_DOCUMENT_AI_VISION_MODEL: "${RAG_DOCUMENT_AI_VISION_MODEL:-}"
      BKCRAB_RAG_DOCUMENT_AI_TEXT_MODEL: "${RAG_DOCUMENT_AI_TEXT_MODEL:-}"
      BKCRAB_RAG_DOCUMENT_AI_RESPONSE_FORMAT: "${RAG_DOCUMENT_AI_RESPONSE_FORMAT:-json_schema}"
      BKCRAB_RAG_DOCUMENT_AI_VISION_PROMPT_VERSION: "${RAG_DOCUMENT_AI_VISION_PROMPT_VERSION:-vision-v3}"
      BKCRAB_RAG_DOCUMENT_AI_ALLOWED_ENDPOINT_HOSTS: "${RAG_DOCUMENT_AI_ALLOWED_ENDPOINT_HOSTS:-}"
      BKCRAB_RAG_DOCUMENT_AI_ALLOW_PRIVATE_ENDPOINT: "${RAG_DOCUMENT_AI_ALLOW_PRIVATE_ENDPOINT:-false}"
      BKCRAB_RAG_LIMITS_MAX_FILE_MB: "${RAG_MAX_FILE_MB:-50}"
      BKCRAB_RAG_LIMITS_MAX_PAGES_PER_DOCUMENT: "${RAG_MAX_PAGES_PER_DOCUMENT:-300}"
      BKCRAB_RAG_LIMITS_MAX_ASSETS_PER_DOCUMENT: "${RAG_MAX_ASSETS_PER_DOCUMENT:-500}"
      BKCRAB_RAG_LIMITS_MAX_ASSET_BYTES: "${RAG_MAX_ASSET_BYTES:-20971520}"
      BKCRAB_RAG_LIMITS_MAX_EXTRACTED_BYTES: "${RAG_MAX_EXTRACTED_BYTES:-209715200}"
      BKCRAB_RAG_LIMITS_MAX_IMAGE_PIXELS: "${RAG_MAX_IMAGE_PIXELS:-40000000}"
      BKCRAB_RAG_LIMITS_PDF_RENDER_DPI: "${RAG_PDF_RENDER_DPI:-180}"
      BKCRAB_RAG_LIMITS_PARSE_TIMEOUT_MS: "${RAG_PARSE_TIMEOUT_MS:-600000}"
    depends_on:
      milvus-standalone:
        condition: service_healthy
      rag-parser:
        condition: service_healthy

  rag-parser:
    build:
      context: ../../services/rag-parser
      dockerfile: Dockerfile
    image: "${RAG_PARSER_IMAGE:-bkcrab/rag-parser:0.1.0}"
    restart: unless-stopped
    init: true
    user: "65532:65532"
    read_only: true
    environment:
      RAG_PARSER_SERVICE_VERSION: "${RAG_PARSER_SERVICE_VERSION:-0.1.0}"
      RAG_PARSER_PORT: "8080"
      RAG_PARSER_TEMP_ROOT: /tmp/rag-parser
      HOME: /tmp/rag-parser
      TMPDIR: /tmp/rag-parser
      XDG_CACHE_HOME: /tmp/rag-parser/cache
      # The parser derives its byte/second limits from the exact canonical
      # values injected into bkcrab. Legacy RAG_PARSER_* aliases remain
      # supported by the image, but a mismatch is a startup error.
      BKCRAB_RAG_LIMITS_MAX_FILE_MB: "${RAG_MAX_FILE_MB:-50}"
      BKCRAB_RAG_LIMITS_MAX_EXTRACTED_BYTES: "${RAG_MAX_EXTRACTED_BYTES:-209715200}"
      BKCRAB_RAG_LIMITS_PARSE_TIMEOUT_MS: "${RAG_PARSE_TIMEOUT_MS:-600000}"
      RAG_PARSER_MAX_ENTRY_BYTES: "${RAG_MAX_ASSET_BYTES:-20971520}"
      RAG_PARSER_MAX_EXTRACTED_BYTES: "${RAG_MAX_EXTRACTED_BYTES:-209715200}"
      RAG_PARSER_MAX_ASSET_BYTES: "${RAG_MAX_ASSET_BYTES:-20971520}"
      RAG_PARSER_MAX_ASSETS: "${RAG_MAX_ASSETS_PER_DOCUMENT:-500}"
      RAG_PARSER_MAX_IMAGE_PIXELS: "${RAG_MAX_IMAGE_PIXELS:-40000000}"
      RAG_PARSER_MAX_PAGES: "${RAG_MAX_PAGES_PER_DOCUMENT:-300}"
      RAG_PARSER_PDF_RENDER_DPI: "${RAG_PDF_RENDER_DPI:-180}"
    tmpfs:
      - "/tmp/rag-parser:size=${RAG_PARSER_TMPFS_SIZE_BYTES:-536870912},mode=0700,uid=65532,gid=65532"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    cpus: "${RAG_PARSER_CPUS:-1.0}"
    mem_limit: "${RAG_PARSER_MEMORY_LIMIT:-1g}"
    networks:
      - rag-parser-internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      ETCDCTL_API: "3"
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://milvus-etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus-standalone:
    image: milvusdb/milvus:v2.6.19
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in deploy/docker/.env}"
      MINIO_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in deploy/docker/.env}"
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_WEB_PORT:-19091}:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 5

volumes:
  milvus-etcd-data:
  milvus-data:

networks:
  default: {}
  rag-parser-internal:
    internal: true
