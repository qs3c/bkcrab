# Apply after deploy/k8s/bkcrab.yaml. The parser receives only non-secret
# runtime limits from bkcrab-config and has no object-store or DocumentAI key.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-parser
  namespace: bkcrab
  labels: { app: rag-parser }
spec:
  replicas: 2
  selector: { matchLabels: { app: rag-parser } }
  template:
    metadata:
      labels: { app: rag-parser }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rag-parser
          # Pin to a release tag or digest. Never deploy latest/dev.
          image: ghcr.io/qs3c/bkcrab-rag-parser:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
          env:
            - { name: RAG_PARSER_SERVICE_VERSION, value: "0.1.0" }
            - { name: RAG_PARSER_PORT, value: "8080" }
            - { name: RAG_PARSER_TEMP_ROOT, value: "/tmp" }
            - { name: HOME, value: "/tmp" }
            - { name: TMPDIR, value: "/tmp" }
            - { name: XDG_CACHE_HOME, value: "/tmp/cache" }
            - name: BKCRAB_RAG_LIMITS_MAX_FILE_MB
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_FILE_MB } }
            - name: BKCRAB_RAG_LIMITS_MAX_EXTRACTED_BYTES
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_EXTRACTED_BYTES } }
            - name: BKCRAB_RAG_LIMITS_PARSE_TIMEOUT_MS
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_PARSE_TIMEOUT_MS } }
            - name: RAG_PARSER_MAX_ENTRY_BYTES
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: RAG_PARSER_MAX_ENTRY_BYTES } }
            - name: RAG_PARSER_MAX_EXTRACTED_BYTES
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_EXTRACTED_BYTES } }
            - name: RAG_PARSER_MAX_ASSET_BYTES
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_ASSET_BYTES } }
            - name: RAG_PARSER_MAX_ASSETS
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_ASSETS_PER_DOCUMENT } }
            - name: RAG_PARSER_MAX_IMAGE_PIXELS
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_IMAGE_PIXELS } }
            - name: RAG_PARSER_MAX_PAGES
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_MAX_PAGES_PER_DOCUMENT } }
            - name: RAG_PARSER_PDF_RENDER_DPI
              valueFrom: { configMapKeyRef: { name: bkcrab-config, key: BKCRAB_RAG_LIMITS_PDF_RENDER_DPI } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: parser-tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: parser-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: rag-parser
  namespace: bkcrab
  labels: { app: rag-parser }
spec:
  type: ClusterIP
  selector: { app: rag-parser }
  ports:
    - { name: http, port: 8080, targetPort: http, protocol: TCP }
