# 可选 — 集群内自托管 Postgres，适用于开发/单节点试验。
# 生产环境建议使用托管服务（阿里云 RDS / AWS RDS 等），
# 将 bkclaw.yaml 的 bkclaw-secrets.STORAGE_DSN 指向它；此文件不是必需的。
#
# 与 bkclaw.yaml 一起使用：
#   1. kubectl apply -f postgres.yml          （创建以下资源）
#   2. 在 bkclaw.yaml 中，设置 bkclaw-secrets.STORAGE_DSN 为：
#        postgres://bkclaw:<POSTGRES_PASSWORD above>@bkclaw-db:5432/bkclaw?sslmode=disable
#   3. kubectl apply -f bkclaw.yaml
apiVersion: v1
kind: Secret
metadata:
  name: bkclaw-db
  namespace: bkclaw
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bkclaw-db
  template:
    metadata:
      labels:
        app: bkclaw-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: bkclaw
        - name: POSTGRES_USER
          value: bkclaw
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bkclaw-db
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "bkclaw"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bkclaw-db
---
apiVersion: v1
kind: Service
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  selector:
    app: bkclaw-db
  ports:
  - port: 5432
