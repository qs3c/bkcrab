# Optional — in-cluster self-hosted Postgres, suitable for dev / single-node trials.
# For production, prefer a managed service (Aliyun RDS / AWS RDS / etc.) and
# point bkclaw.yaml's bkclaw-secrets.STORAGE_DSN at it; this file is not needed.
#
# To use alongside bkclaw.yaml:
#   1. kubectl apply -f postgres.yml          (creates the resources below)
#   2. In bkclaw.yaml, set bkclaw-secrets.STORAGE_DSN to:
#        postgres://bkclaw:<POSTGRES_PASSWORD above>@bkclaw-db:5432/bkclaw?sslmode=disable
#   3. kubectl apply -f bkclaw.yaml
apiVersion: v1
kind: Secret
metadata:
  name: bkclaw-db
  namespace: bkclaw
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bkclaw-db
  template:
    metadata:
      labels:
        app: bkclaw-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: bkclaw
        - name: POSTGRES_USER
          value: bkclaw
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bkclaw-db
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "bkclaw"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bkclaw-db
---
apiVersion: v1
kind: Service
metadata:
  name: bkclaw-db
  namespace: bkclaw
spec:
  selector:
    app: bkclaw-db
  ports:
  - port: 5432
