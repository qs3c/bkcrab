{{- if .Values.mysql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "bkclaw.fullname" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "bkclaw.fullname" . }}-db
    spec:
      containers:
      - name: mysql
        image: {{ .Values.mysql.image }}
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_DATABASE
          value: bkclaw
        - name: MYSQL_USER
          value: bkclaw
        - name: MYSQL_PASSWORD
          value: {{ required "mysql.password is required when mysql.enabled=true" .Values.mysql.password | quote }}
        - name: MYSQL_ROOT_PASSWORD
          value: {{ required "mysql.rootPassword is required when mysql.enabled=true" .Values.mysql.rootPassword | quote }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-u", "bkclaw", "-p{{ .Values.mysql.password }}", "--silent"]
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "bkclaw.fullname" . }}-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.mysql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "bkclaw.fullname" . }}-db
  ports:
  - port: 3306
{{- end }}
