{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "bkclaw.fullname" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "bkclaw.fullname" . }}-db
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: bkclaw
        - name: POSTGRES_USER
          value: bkclaw
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.password | quote }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "bkclaw"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "bkclaw.fullname" . }}-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bkclaw.fullname" . }}-db
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "bkclaw.fullname" . }}-db
  ports:
  - port: 5432
{{- end }}
