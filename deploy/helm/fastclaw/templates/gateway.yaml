apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bkclaw.fullname" . }}-gateway
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      app: {{ include "bkclaw.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "bkclaw.fullname" . }}-gateway
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gateway
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http
        envFrom:
        - configMapRef:
            name: {{ include "bkclaw.fullname" . }}-config
        env:
        - name: BKCLAW_HOME
          value: "/data/.bkclaw"
        - name: BKCLAW_STORAGE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ include "bkclaw.fullname" . }}-secrets
              key: STORAGE_DSN
        {{- if and (ne .Values.objectStore.type "local") .Values.objectStore.accessKey }}
        - name: BKCLAW_OBJECT_STORE_ACCESSKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "bkclaw.fullname" . }}-secrets
              key: OBJECT_STORE_ACCESSKEY
        - name: BKCLAW_OBJECT_STORE_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: {{ include "bkclaw.fullname" . }}-secrets
              key: OBJECT_STORE_SECRETKEY
        {{- end }}
        {{- if and .Values.sandbox.enabled .Values.sandbox.e2bApiKey }}
        - name: E2B_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "bkclaw.fullname" . }}-secrets
              key: E2B_API_KEY
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data/.bkclaw
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
        # /readyz and /livez bypass auth — they probe reliably both before
        # and after onboard. Don't switch to /api/status: that path 401s
        # once onboard is complete.
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep {{ .Values.gateway.preStopSleepSeconds }}"]
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      volumes:
      # /data/.bkclaw only holds pod-local ephemeral state; workspace
      # artifacts go to the object store.
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bkclaw.fullname" . }}-gateway
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "bkclaw.fullname" . }}-gateway
  # SSE/WS connections must stick to the same pod under multi-replica.
  # The Ingress already does cookie affinity; ClientIP here is a fallback
  # for load balancers that hit the Service directly.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: http
    name: http
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "bkclaw.fullname" . }}-gateway
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "bkclaw.fullname" . }}-gateway
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "bkclaw.fullname" . }}-gateway
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ include "bkclaw.fullname" . }}-gateway
{{- end }}
