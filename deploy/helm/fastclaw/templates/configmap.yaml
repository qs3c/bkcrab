apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bkclaw.fullname" . }}-config
  labels:
    {{- include "bkclaw.labels" . | nindent 4 }}
data:
  BKCLAW_PORT: {{ .Values.gateway.port | quote }}
  BKCLAW_BIND: "all"
  BKCLAW_STORAGE_TYPE: {{ include "bkclaw.storageType" . | quote }}
  BKCLAW_STORAGE_AUTO_MIGRATE: "true"
  {{- with .Values.timezone }}
  ## Server default timezone — last fallback after chatter / agent /
  ## system prefs.
  TZ: {{ . | quote }}
  {{- end }}

  ## Object store
  BKCLAW_OBJECT_STORE_TYPE: {{ .Values.objectStore.type | quote }}
  {{- with .Values.objectStore.bucket }}
  BKCLAW_OBJECT_STORE_BUCKET: {{ . | quote }}
  {{- end }}
  {{- with .Values.objectStore.region }}
  BKCLAW_OBJECT_STORE_REGION: {{ . | quote }}
  {{- end }}
  {{- with .Values.objectStore.endpoint }}
  BKCLAW_OBJECT_STORE_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- with .Values.objectStore.accountId }}
  BKCLAW_OBJECT_STORE_ACCOUNTID: {{ . | quote }}
  {{- end }}
  {{- with .Values.objectStore.prefix }}
  BKCLAW_OBJECT_STORE_PREFIX: {{ . | quote }}
  {{- end }}
  BKCLAW_OBJECT_STORE_USESSL: {{ .Values.objectStore.useSSL | quote }}
  {{- if .Values.objectStore.aliyunInternal }}
  BKCLAW_OBJECT_STORE_ALIYUN_INTERNAL: "true"
  {{- end }}

  ## Sandbox
  {{- if .Values.sandbox.enabled }}
  BKCLAW_SANDBOX_BACKEND: {{ .Values.sandbox.backend | quote }}
  {{- with .Values.sandbox.image }}
  BKCLAW_SANDBOX_IMAGE: {{ . | quote }}
  {{- end }}
  {{- end }}

  {{- with .Values.extraEnv }}
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
