## BkCrab Helm Chart — 默认值
##
## 与 deploy/k8s/bkcrab.yaml 语义相同：环境变量驱动，无
## init-container sed，工作区工件进入对象存储
## (S3 / OSS / R2 / B2 / MinIO / …)，从而实现多副本水平扩展。

image:
  repository: ghcr.io/qs3c/bkcrab
  # 生产环境固定到 :v0.x.y 或提交 sha — 不要使用 latest/dev。
  tag: dev
  pullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: regcred

## 服务器默认时区（IANA 名称）— 链中最后的回退
## 聊天偏好 → agent 默认 → 系统默认 → TZ。空 = 容器默认
##（UTC）：聊天者从未设置时区的 agent 会看到 UTC 时钟
## 并接收 UTC 触发的计划任务。
timezone: "Asia/Shanghai"

## Gateway
gateway:
  replicas: 2
  port: 18953
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  # SSE/WS 的排空预算。preStop 休眠占用大部分；剩余部分留给 Go 的优雅关闭。
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 30

## 多模态文档 RAG。三个高成本能力是独立发布开关，默认关闭。
## 即使 parser 健康，也只有显式打开对应 gate 后才允许新任务使用。
rag:
  enabled: false
  advancedEnabled: false
  officeEnabled: false
  enrichmentEnabled: false

  milvus:
    address: ""
    username: ""
    password: ""
  embedding:
    endpoint: ""
    apiKey: ""
    model: ""
    dims: 0
  reranker:
    enabled: false
    endpoint: ""
    apiKey: ""
    model: ""
    timeoutMS: 5000
    candidateTopK: 20
    minScore: 0.5

  documentAI:
    apiType: openai-compatible
    endpoint: ""
    apiKey: ""                 # Secret；仅注入 gateway，绝不注入 parser
    visionModel: ""
    textModel: ""
    allowedEndpointHosts: ""  # 逗号分隔的精确 host allow-list
    allowPrivateEndpoint: false

  parser:
    enabled: true
    replicas: 2
    port: 8080
    image:
      repository: ghcr.io/qs3c/bkcrab-rag-parser
      # 固定 release tag 或 digest；禁止 latest/dev。
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    serviceVersion: "0.1.0"
    tempSizeLimit: 512Mi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    networkPolicy:
      enabled: true
      # 仅当命名空间已有选择 gateway 的 egress 限制时打开；策略是
      # additive allow，不替代 DB/object-store/provider 的现有 allows。
      allowGatewayEgress: false

  # 这些值以相同 BKCRAB_RAG_LIMITS_* 环境变量同时注入 gateway 和
  # parser；parser 在进程内完成 byte/second 换算，不存在第二套部署值。
  limits:
    maxFileMB: 50
    maxPagesPerDocument: 300
    maxAssetsPerDocument: 500
    maxAssetBytes: 20971520
    maxExtractedBytes: 209715200
    maxImagePixels: 40000000
    pdfRenderDPI: 180
    parseTimeoutMS: 600000

## HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

## PodDisruptionBudget
pdb:
  enabled: true
  minAvailable: 1

## 数据库
##
## 推荐使用托管的 MySQL 并设置 externalDSN。内置的数据库 Pod 仅
## 适用于开发和单节点试验。
externalDatabaseType: mysql
mysql:
  enabled: false
  image: mysql:8.4
  password: ""
  rootPassword: ""
  storage: 10Gi
postgres:
  enabled: false                # 默认关闭 — 生产环境使用托管的 PG
  image: postgres:16-alpine
  password: ""                  # enabled=true 时必需
  storage: 10Gi
externalDSN: ""                 # MySQL：user:pass@tcp(host:3306)/db?parseTime=true

## 对象存储 — 工作区工件、上传文件、生成的图片/PDF 都在此存储。
## 多副本必需：没有它，同一会话在不同 Pod 上会看到不同的文件。
##
## type 接受以下值：
##   local           Pod 本地磁盘（单副本开发 — 绝不要用于生产）
##   aws-s3          AWS S3
##   cloudflare-r2   Cloudflare R2（需要 accountId）
##   backblaze-b2    Backblaze B2（兼容 S3）
##   aliyun-oss      阿里云 OSS
##   minio           自托管 MinIO（需要 endpoint）
##   s3              通用 S3 兼容（需要 endpoint — 例如 DO Spaces / Wasabi）
objectStore:
  type: local
  bucket: ""
  region: ""
  endpoint: ""                  # 为 MinIO / 通用 S3 兼容设置
  accountId: ""                 # 为 Cloudflare R2 设置
  accessKey: ""                 # 通过 Secret 注入 — 不要提交真实值
  secretKey: ""
  prefix: ""                    # 跨环境共享一个存储桶时的前缀
  useSSL: true
  aliyunInternal: false         # ACK 同区域使用 OSS 内部端点

## 沙箱（技能执行容器）
##
## k8s Pod 没有 Docker 守护进程 — 仅支持 e2b（远程）或禁用。
sandbox:
  enabled: false
  backend: e2b                  # 仅 "e2b"（k8s 中不可用 Docker）
  image: thinkany/bkcrab-sandbox:latest
  e2bApiKey: ""

## Ingress
ingress:
  enabled: false
  className: nginx              # or "alb" (Aliyun ACK ALB)
  host: bkcrab.example.com
  tls: false
  tlsSecret: ""
  certManagerIssuer: ""         # 例如 "letsencrypt-prod"
  proxyBodySize: "32m"
  ## 使用 ALB Ingress (alb.ingress.kubernetes.io/*) 时，覆盖此映射。
  annotations: {}

## 额外传递给 ConfigMap 的 BKCRAB_* 环境变量。
extraEnv: {}
  # BKCRAB_LOG_LEVEL: "info"
  # BKCRAB_DAEMON_IDLE_TIMEOUT_SECONDS: "300"
