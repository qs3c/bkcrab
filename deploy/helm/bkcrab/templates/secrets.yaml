apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bkcrab.fullname" . }}-secrets
  labels:
    {{- include "bkcrab.labels" . | nindent 4 }}
type: Opaque
stringData:
  STORAGE_DSN: {{ include "bkcrab.dsn" . | quote }}
  {{- if and (ne .Values.objectStore.type "local") .Values.objectStore.accessKey }}
  OBJECT_STORE_ACCESSKEY: {{ .Values.objectStore.accessKey | quote }}
  OBJECT_STORE_SECRETKEY: {{ .Values.objectStore.secretKey | quote }}
  {{- end }}
  {{- if and .Values.sandbox.enabled .Values.sandbox.e2bApiKey }}
  E2B_API_KEY: {{ .Values.sandbox.e2bApiKey | quote }}
  {{- end }}
  {{- if and .Values.rag.enabled .Values.rag.milvus.username }}
  RAG_MILVUS_USERNAME: {{ .Values.rag.milvus.username | quote }}
  RAG_MILVUS_PASSWORD: {{ .Values.rag.milvus.password | quote }}
  {{- end }}
  {{- if and .Values.rag.enabled .Values.rag.embedding.apiKey }}
  RAG_EMBEDDING_API_KEY: {{ .Values.rag.embedding.apiKey | quote }}
  {{- end }}
  {{- if and .Values.rag.enabled .Values.rag.reranker.apiKey }}
  RAG_RERANKER_API_KEY: {{ .Values.rag.reranker.apiKey | quote }}
  {{- end }}
  {{- if and .Values.rag.enabled .Values.rag.documentAI.apiKey }}
  DOCUMENT_AI_API_KEY: {{ .Values.rag.documentAI.apiKey | quote }}
  {{- end }}
